<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invoice Generator</title>
    <link rel="stylesheet" href="/assets/style.css">
</head>
<body>
    <div class="page">
        <div class="card">
            <div class="header">
                <h1>Create Invoice</h1>
                <div class="actions">
                    <button id="invoice-randomize" class="btn">Randomize</button>
                    <button id="invoice-html" class="btn">View HTML</button>
                    <button id="invoice-submit" class="btn btn-primary">Generate PDF</button>
                </div>
            </div>
            <form id="invoice-form">

                <fieldset class="grid-3">
                    <legend>Invoice Details</legend>
                    <div><label>Invoice #</label><input id="inv-number" required></div>
                    <div><label>Date Issued</label><input id="inv-date-issued" type="date" required></div>
                    <div><label>Date Due</label><input id="inv-date-due" type="date" required></div>
                    <div><label>Currency</label><input id="inv-currency" value="USD" required></div>
                    <div><label>Symbol</label><input id="inv-currency-symbol" value="$" required></div>
                </fieldset>

                <div class="grid-2">
                    <fieldset>
                        <legend>From</legend>
                        <div class="stack">
                            <div><label>Company</label><input id="inv-from-name" required></div>
                            <div><label>Address</label><textarea id="inv-from-address" rows="3" required></textarea></div>
                            <div><label>Email</label><input id="inv-from-email" type="email"></div>
                            <div><label>Phone</label><input id="inv-from-phone"></div>
                            <div><label>VAT</label><input id="inv-from-vat"></div>
                        </div>
                    </fieldset>
                    <fieldset>
                        <legend>Bill To</legend>
                        <div class="stack">
                            <div><label>Company</label><input id="inv-to-name" required></div>
                            <div><label>Address</label><textarea id="inv-to-address" rows="3" required></textarea></div>
                            <div><label>Email</label><input id="inv-to-email" type="email"></div>
                            <div><label>VAT</label><input id="inv-to-vat"></div>
                        </div>
                    </fieldset>
                </div>

                <fieldset>
                    <legend>Line Items</legend>
                    <table id="inv-items-table">
                        <thead>
                            <tr>
                                <th style="text-align:left;">Description</th>
                                <th style="text-align:left;">Detail</th>
                                <th style="text-align:right;width:60px;">Qty</th>
                                <th style="text-align:right;width:100px;">Unit Price</th>
                                <th style="text-align:right;width:100px;">Amount</th>
                                <th style="width:40px;"></th>
                            </tr>
                        </thead>
                        <tbody id="inv-items-body"></tbody>
                    </table>
                    <button id="inv-add-item" type="button" class="btn" style="margin-top:0.5rem;">+ Add Item</button>
                </fieldset>

                <fieldset class="grid-4">
                    <legend>Totals</legend>
                    <div><label>Subtotal</label><input id="inv-subtotal" readonly></div>
                    <div><label>Tax Label</label><input id="inv-tax-label" value="VAT (15%)"></div>
                    <div><label>Tax Amount</label><input id="inv-tax-amount" readonly></div>
                    <div><label>Total</label><input id="inv-total" readonly style="font-weight:bold;"></div>
                </fieldset>

                <fieldset class="grid-2">
                    <legend>Payment Details</legend>
                    <div><label>Bank</label><input id="inv-pay-bank"></div>
                    <div><label>Account</label><input id="inv-pay-account"></div>
                    <div><label>Branch Code</label><input id="inv-pay-branch"></div>
                    <div><label>Reference</label><input id="inv-pay-ref"></div>
                </fieldset>

                <fieldset>
                    <legend>Notes</legend>
                    <textarea id="inv-notes" rows="2"></textarea>
                </fieldset>
            </form>
        </div>
    </div>

{% raw %}<script>
"use strict";

const form = document.getElementById("invoice-form");
const itemsBody = document.getElementById("inv-items-body");

document.getElementById("inv-add-item").addEventListener("click", function() { addItemRow(); });
document.getElementById("invoice-submit").addEventListener("click", submitInvoice);
document.getElementById("invoice-html").addEventListener("click", viewHtml);
document.getElementById("invoice-randomize").addEventListener("click", randomize);

// Initialize with random data
randomize();

// --- Helpers ---

function val(id) { return document.querySelector(id).value; }
function setVal(id, v) { document.querySelector(id).value = v; }

function addItemRow(desc, detail, qty, price) {
    desc = desc || ""; detail = detail || ""; qty = qty || 1; price = price || "0.00";
    var tr = document.createElement("tr");

    var cells = [
        { cls: "inv-item-desc", type: "text", val: desc, required: true, align: "left" },
        { cls: "inv-item-detail", type: "text", val: detail, required: false, align: "left" },
        { cls: "inv-item-qty", type: "number", val: qty, required: true, align: "right", min: "1" },
        { cls: "inv-item-price", type: "text", val: price, required: true, align: "right", min: "0" },
    ];

    cells.forEach(function(c) {
        var td = document.createElement("td");
        td.style.padding = "0.25rem";
        var input = document.createElement("input");
        input.className = c.cls;
        input.type = c.type;
        input.value = c.val;
        if (c.required) input.required = true;
        if (c.min) input.min = c.min;
        input.style.width = "100%";
        if (c.align === "right") input.style.textAlign = "right";
        if (c.cls === "inv-item-qty" || c.cls === "inv-item-price") {
            input.addEventListener("input", recalculateTotals);
        }
        td.appendChild(input);
        tr.appendChild(td);
    });

    // Amount cell
    var amtTd = document.createElement("td");
    amtTd.style.padding = "0.25rem";
    amtTd.style.textAlign = "right";
    var amtSpan = document.createElement("span");
    amtSpan.className = "inv-item-amount";
    amtSpan.textContent = "0.00";
    amtTd.appendChild(amtSpan);
    tr.appendChild(amtTd);

    // Remove button
    var rmTd = document.createElement("td");
    rmTd.style.padding = "0.25rem";
    rmTd.style.textAlign = "center";
    var rmBtn = document.createElement("button");
    rmBtn.type = "button";
    rmBtn.textContent = "\u00d7";
    rmBtn.style.cssText = "cursor:pointer;border:none;background:none;font-size:1.2rem;";
    rmBtn.addEventListener("click", function() { tr.remove(); recalculateTotals(); });
    rmTd.appendChild(rmBtn);
    tr.appendChild(rmTd);

    itemsBody.appendChild(tr);
    recalculateTotals();
}

function recalculateTotals() {
    var subtotal = 0;
    itemsBody.querySelectorAll("tr").forEach(function(row) {
        var qty = parseFloat(row.querySelector(".inv-item-qty").value) || 0;
        var price = parseFloat(row.querySelector(".inv-item-price").value) || 0;
        var amount = qty * price;
        row.querySelector(".inv-item-amount").textContent = amount.toFixed(2);
        subtotal += amount;
    });
    var tax = subtotal * 0.15;
    var total = subtotal + tax;
    setVal("#inv-subtotal", subtotal.toFixed(2));
    setVal("#inv-tax-amount", tax.toFixed(2));
    setVal("#inv-total", total.toFixed(2));
}

function buildInvoiceBody() {
    var lines = function(id) { return val(id).split("\n").map(function(s) { return s.trim(); }).filter(Boolean); };
    var opt = function(id) { var s = val(id); return s || undefined; };

    var items = [];
    itemsBody.querySelectorAll("tr").forEach(function(row) {
        var desc = row.querySelector(".inv-item-desc").value;
        var detail = row.querySelector(".inv-item-detail").value || undefined;
        var qty = parseFloat(row.querySelector(".inv-item-qty").value) || 0;
        var price = parseFloat(row.querySelector(".inv-item-price").value) || 0;
        items.push({ description: desc, detail: detail, quantity: qty, unit_price: price.toFixed(2), amount: (qty * price).toFixed(2) });
    });

    var payment = {};
    if (val("#inv-pay-bank")) payment["Bank"] = val("#inv-pay-bank");
    if (val("#inv-pay-account")) payment["Account"] = val("#inv-pay-account");
    if (val("#inv-pay-branch")) payment["Branch Code"] = val("#inv-pay-branch");
    if (val("#inv-pay-ref")) payment["Reference"] = val("#inv-pay-ref");

    return {
        invoice_number: val("#inv-number"),
        date_issued: val("#inv-date-issued"),
        date_due: val("#inv-date-due"),
        currency: val("#inv-currency"),
        currency_symbol: val("#inv-currency-symbol"),
        from: { name: val("#inv-from-name"), address: lines("#inv-from-address"), email: opt("#inv-from-email"), phone: opt("#inv-from-phone"), vat: opt("#inv-from-vat") },
        to: { name: val("#inv-to-name"), address: lines("#inv-to-address"), email: opt("#inv-to-email"), vat: opt("#inv-to-vat") },
        items: items,
        subtotal: val("#inv-subtotal"),
        tax_label: opt("#inv-tax-label") || null,
        tax_amount: opt("#inv-tax-amount") || null,
        discount: null,
        total: val("#inv-total"),
        payment: Object.keys(payment).length > 0 ? payment : null,
        notes: opt("#inv-notes") || null,
    };
}

async function submitInvoice() {
    if (!form.reportValidity()) return;

    var btn = document.getElementById("invoice-submit");
    btn.textContent = "Generating...";
    btn.disabled = true;

    try {
        var resp = await fetch("/api/invoice", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(buildInvoiceBody()),
        });
        if (!resp.ok) {
            var body = await resp.json().catch(function() { return { detail: "Request failed" }; });
            throw new Error(body.detail || body.error || "HTTP " + resp.status);
        }
        var blob = await resp.blob();
        var url = URL.createObjectURL(blob);
        var a = document.createElement("a");
        a.href = url;
        a.download = "invoice.pdf";
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    } catch (err) {
        alert("PDF generation failed: " + err.message);
    } finally {
        btn.textContent = "Generate PDF";
        btn.disabled = false;
    }
}

// Same endpoint, `?format=html`: render the invoice to HTML and open it in a new
// tab so you can see the HTML output of the same Typst template.
async function viewHtml() {
    if (!form.reportValidity()) return;

    var btn = document.getElementById("invoice-html");
    btn.textContent = "Rendering...";
    btn.disabled = true;

    try {
        var resp = await fetch("/api/invoice?format=html", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(buildInvoiceBody()),
        });
        if (!resp.ok) {
            var body = await resp.json().catch(function() { return { detail: "Request failed" }; });
            throw new Error(body.detail || body.error || "HTTP " + resp.status);
        }
        var html = await resp.text();
        var win = window.open("", "_blank");
        if (win) {
            win.document.open();
            win.document.write(html);
            win.document.close();
        } else {
            alert("Pop-up blocked — allow pop-ups to view the HTML output.");
        }
    } catch (err) {
        alert("HTML generation failed: " + err.message);
    } finally {
        btn.textContent = "View HTML";
        btn.disabled = false;
    }
}

function randomize() {
    var pick = function(arr) { return arr[Math.floor(Math.random() * arr.length)]; };
    var randInt = function(min, max) { return Math.floor(min + Math.random() * (max - min)); };

    var num = "INV-2026-" + String(randInt(1000, 9999));
    var today = new Date();
    var due = new Date(today);
    due.setDate(due.getDate() + 30);
    var fmt = function(d) { return d.toISOString().slice(0, 10); };

    var companies = ["Acme Solutions Ltd.", "Widget Corp.", "Blue Sky Industries", "Pinnacle Tech", "Summit Digital", "Horizon Labs"];
    var cities = ["Cape Town, 8001", "Johannesburg, 2000", "London, EC1A 1BB", "New York, NY 10001", "Berlin, 10115"];
    var streets = ["123 Business Park", "456 Innovation Drive", "789 Market Street", "321 Tech Boulevard", "654 Enterprise Way"];

    setVal("#inv-number", num);
    setVal("#inv-date-issued", fmt(today));
    setVal("#inv-date-due", fmt(due));
    setVal("#inv-currency", "USD");
    setVal("#inv-currency-symbol", "$");

    setVal("#inv-from-name", pick(companies));
    setVal("#inv-from-address", pick(streets) + "\nSuite " + randInt(100, 999) + "\n" + pick(cities));
    setVal("#inv-from-email", "billing@" + pick(["acme.co", "widget.io", "bluesky.com"]));
    setVal("#inv-from-phone", "+1 555 " + String(randInt(1000000, 9999999)));
    setVal("#inv-from-vat", "VAT" + String(randInt(1000000000, 9999999999)));

    var fromName = val("#inv-from-name");
    setVal("#inv-to-name", pick(companies.filter(function(c) { return c !== fromName; })) || pick(companies));
    setVal("#inv-to-address", pick(streets) + "\nFloor " + randInt(1, 20) + "\n" + pick(cities));
    setVal("#inv-to-email", "accounts@" + pick(["corp.co", "biz.io", "enterprise.com"]));
    setVal("#inv-to-vat", "VAT" + String(randInt(1000000000, 9999999999)));

    var descriptions = [
        { description: "Web Application Development", detail: "Frontend and backend implementation", qty: [40, 160], price: [100, 200] },
        { description: "UI/UX Design", detail: "Wireframes, prototypes, and design system", qty: [20, 80], price: [80, 150] },
        { description: "Cloud Infrastructure Setup", detail: null, qty: [1, 3], price: [1500, 5000] },
        { description: "Monthly Hosting", detail: "April 2026", qty: [1, 1], price: [200, 500] },
        { description: "Database Migration", detail: "PostgreSQL to CockroachDB", qty: [10, 40], price: [120, 180] },
        { description: "Security Audit", detail: "Penetration testing and code review", qty: [1, 5], price: [2000, 8000] },
    ];

    itemsBody.textContent = "";
    var count = 2 + Math.floor(Math.random() * 3);
    var shuffled = descriptions.slice().sort(function() { return 0.5 - Math.random(); }).slice(0, count);
    shuffled.forEach(function(item) {
        var qty = randInt(item.qty[0], item.qty[1]);
        var price = (item.price[0] + Math.random() * (item.price[1] - item.price[0])).toFixed(2);
        addItemRow(item.description, item.detail || "", qty, price);
    });

    setVal("#inv-pay-bank", pick(["First National Bank", "Standard Bank", "Chase", "HSBC"]));
    setVal("#inv-pay-account", String(randInt(10000000000, 99999999999)));
    setVal("#inv-pay-branch", String(randInt(100000, 999999)));
    setVal("#inv-pay-ref", num);
    setVal("#inv-notes", "Payment is due within 30 days. Late payments may incur a 2% monthly interest charge. Thank you for your business!");

    recalculateTotals();
}
</script>{% endraw %}
</body>
</html>
